<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный дневник</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📔 Личный дневник</h1>
            <nav>
                <a href="{{ url_for('index') }}">🏠 Главная</a>
                <a href="{{ url_for('add') }}">✏️ Новая запись</a>
            </nav>
            
            <!-- Форма поиска -->
            <form action="{{ url_for('search') }}" method="GET" class="search-form">
                <input type="text" name="q" placeholder="Поиск по заголовкам..." value="{{ search_query if search_query else '' }}">
                <button type="submit">🔍 Найти</button>
            </form>
            
            <!-- Фильтр по дате -->
            <div class="filter-links">
                <a href="{{ url_for('index') }}">📋 Все записи</a> |
                <a href="{{ url_for('filter_week') }}">📅 За последнюю неделю</a>
            </div>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2026 Личный дневник | Создано с ❤️ на Flask</p>
        </footer>
    </div>
</body>
</html>
