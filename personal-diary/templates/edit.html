{% extends "base.html" %}

{% block content %}
<h2>✏️ Редактирование записи</h2>

<form method="POST" class="entry-form">
    <div class="form-group">
        <label for="title">Заголовок:</label>
        <input type="text" name="title" id="title" required value="{{ entry.title }}">
    </div>
    
    <div class="form-group">
        <label for="content">Текст записи:</label>
        <textarea name="content" id="content" rows="10" required>{{ entry.content }}</textarea>
    </div>
    
    <div class="form-actions">
        <button type="submit" class="btn-save">💾 Сохранить</button>
        <a href="{{ url_for('index') }}" class="btn-cancel">❌ Отмена</a>
    </div>
</form>
{% endblock %}
